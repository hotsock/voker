AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Short-lived live AWS ingress probe for all vokerhttp adapters

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetA:
    Type: AWS::EC2::Subnet::Id
  SubnetB:
    Type: AWS::EC2::Subnet::Id

Globals:
  Function:
    Architectures: [arm64]
    Handler: bootstrap
    LoggingConfig:
      ApplicationLogLevel: INFO
      LogFormat: JSON
      SystemLogLevel: INFO
    MemorySize: 128
    Runtime: provided.al2023
    Timeout: 5

Resources:
  ProbeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ALBFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./bin/function.zip
      Role: !GetAtt ProbeRole.Arn
      Environment: {Variables: {VOKER_ADAPTER: alb}}
  APIGatewayV1Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./bin/function.zip
      Role: !GetAtt ProbeRole.Arn
      Environment: {Variables: {VOKER_ADAPTER: apigwv1}}
  APIGatewayV1StreamingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./bin/function.zip
      Role: !GetAtt ProbeRole.Arn
      Environment:
        Variables:
          VOKER_ADAPTER: apigwv1
          VOKER_STREAMING: "true"
  APIGatewayV2Function:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./bin/function.zip
      Role: !GetAtt ProbeRole.Arn
      Environment: {Variables: {VOKER_ADAPTER: apigwv2}}
  FunctionURLFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./bin/function.zip
      Role: !GetAtt ProbeRole.Arn
      Environment: {Variables: {VOKER_ADAPTER: functionurl}}
  FunctionURLStreamingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./bin/function.zip
      Role: !GetAtt ProbeRole.Arn
      Environment:
        Variables:
          VOKER_ADAPTER: functionurl
          VOKER_STREAMING: "true"

  ALBLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ALBFunction}
      RetentionInDays: 1
  APIGatewayV1LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${APIGatewayV1Function}
      RetentionInDays: 1
  APIGatewayV1StreamingLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${APIGatewayV1StreamingFunction}
      RetentionInDays: 1
  APIGatewayV2LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${APIGatewayV2Function}
      RetentionInDays: 1
  FunctionURLLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${FunctionURLFunction}
      RetentionInDays: 1
  FunctionURLStreamingLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${FunctionURLStreamingFunction}
      RetentionInDays: 1

  FunctionURL:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      InvokeMode: BUFFERED
      TargetFunctionArn: !GetAtt FunctionURLFunction.Arn
  FunctionURLPublicInvokeURL:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref FunctionURLFunction
      FunctionUrlAuthType: NONE
      Principal: "*"
  FunctionURLPublicInvokeFunction:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FunctionURLFunction
      InvokedViaFunctionUrl: true
      Principal: "*"

  FunctionURLStreaming:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      InvokeMode: RESPONSE_STREAM
      TargetFunctionArn: !GetAtt FunctionURLStreamingFunction.Arn
  FunctionURLStreamingPublicInvokeURL:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref FunctionURLStreamingFunction
      FunctionUrlAuthType: NONE
      Principal: "*"
  FunctionURLStreamingPublicInvokeFunction:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FunctionURLStreamingFunction
      InvokedViaFunctionUrl: true
      Principal: "*"

  RestAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      BinaryMediaTypes: ["*/*"]
      EndpointConfiguration: {Types: [REGIONAL]}
      Name: !Sub ${AWS::StackName}-rest-buffered
  RestProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt RestAPI.RootResourceId
      PathPart: "{proxy+}"
      RestApiId: !Ref RestAPI
  RestRootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: ANY
      ResourceId: !GetAtt RestAPI.RootResourceId
      RestApiId: !Ref RestAPI
      Integration:
        IntegrationHttpMethod: POST
        ResponseTransferMode: BUFFERED
        Type: AWS_PROXY
        Uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${APIGatewayV1Function.Arn}/invocations
  RestProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: ANY
      ResourceId: !Ref RestProxyResource
      RestApiId: !Ref RestAPI
      Integration:
        IntegrationHttpMethod: POST
        ResponseTransferMode: BUFFERED
        Type: AWS_PROXY
        Uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${APIGatewayV1Function.Arn}/invocations
  RestBufferedDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: [RestRootMethod, RestProxyMethod]
    Properties:
      Description: Buffered Lambda proxy integration
      RestApiId: !Ref RestAPI
      StageName: live
  RestInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref APIGatewayV1Function
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${RestAPI}/*/*/*

  RestStreamingAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      EndpointConfiguration: {Types: [REGIONAL]}
      Name: !Sub ${AWS::StackName}-rest-streaming
  RestStreamingProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt RestStreamingAPI.RootResourceId
      PathPart: "{proxy+}"
      RestApiId: !Ref RestStreamingAPI
  RestStreamingRootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: ANY
      ResourceId: !GetAtt RestStreamingAPI.RootResourceId
      RestApiId: !Ref RestStreamingAPI
      Integration:
        IntegrationHttpMethod: POST
        ResponseTransferMode: STREAM
        Type: AWS_PROXY
        Uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2021-11-15/functions/${APIGatewayV1StreamingFunction.Arn}/response-streaming-invocations
  RestStreamingProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: ANY
      ResourceId: !Ref RestStreamingProxyResource
      RestApiId: !Ref RestStreamingAPI
      Integration:
        IntegrationHttpMethod: POST
        ResponseTransferMode: STREAM
        Type: AWS_PROXY
        Uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2021-11-15/functions/${APIGatewayV1StreamingFunction.Arn}/response-streaming-invocations
  RestStreamingDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: [RestStreamingRootMethod, RestStreamingProxyMethod]
    Properties:
      Description: Streaming Lambda proxy integration
      RestApiId: !Ref RestStreamingAPI
      StageName: live
  RestStreamingInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref APIGatewayV1StreamingFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${RestStreamingAPI}/*/*/*

  HTTPAPI:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${AWS::StackName}-http
      ProtocolType: HTTP
  HTTPIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HTTPAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt APIGatewayV2Function.Arn
      PayloadFormatVersion: "2.0"
  HTTPDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HTTPAPI
      AuthorizationType: NONE
      RouteKey: $default
      Target: !Join [/, [integrations, !Ref HTTPIntegration]]
  HTTPDefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HTTPAPI
      AutoDeploy: true
      StageName: $default
  HTTPInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref APIGatewayV2Function
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HTTPAPI}/*

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTP access for the short-lived vokerhttp probe
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      VpcId: !Ref VpcId
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      SecurityGroups: [!Ref ALBSecurityGroup]
      Subnets: [!Ref SubnetA, !Ref SubnetB]
      Type: application
  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: ALBInvokePermission
    Properties:
      TargetType: lambda
      Targets:
        - Id: !GetAtt ALBFunction.Arn
      TargetGroupAttributes:
        - Key: lambda.multi_value_headers.enabled
          Value: "true"
  ALBInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ALBFunction
      Principal: elasticloadbalancing.amazonaws.com
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP

Outputs:
  ALBBufferedEndpoint:
    Value: !Sub http://${ALB.DNSName}
  APIGatewayV1BufferedEndpoint:
    Value: !Sub https://${RestAPI}.execute-api.${AWS::Region}.${AWS::URLSuffix}/live
  APIGatewayV1StreamingEndpoint:
    Value: !Sub https://${RestStreamingAPI}.execute-api.${AWS::Region}.${AWS::URLSuffix}/live
  APIGatewayV2BufferedEndpoint:
    Value: !GetAtt HTTPAPI.ApiEndpoint
  FunctionURLBufferedEndpoint:
    Value: !GetAtt FunctionURL.FunctionUrl
  FunctionURLStreamingEndpoint:
    Value: !GetAtt FunctionURLStreaming.FunctionUrl
