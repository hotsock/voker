AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Self-contained Voker Lambda Managed Instances concurrency probe

Parameters:
  MaxVCpuCount:
    Type: Number
    Default: 30
    MinValue: 2
    MaxValue: 15000
    Description: Maximum vCPUs the test capacity provider may provision.
  PerExecutionEnvironmentMaxConcurrency:
    Type: Number
    Default: 8
    MinValue: 2
    MaxValue: 64
    Description: Concurrent invocations allowed in each execution environment.
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-igw

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.42.0.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.42.1.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-b

  PublicSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [2, !GetAZs ""]
      CidrBlock: 10.42.2.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-c

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  PublicSubnetCRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetC

  CapacityProviderSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Outbound access for the Voker Managed Instances probe
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: -1
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-capacity-provider

  CapacityProvider:
    Type: AWS::Serverless::CapacityProvider
    DependsOn:
      - DefaultPublicRoute
      - PublicSubnetARouteTableAssociation
      - PublicSubnetBRouteTableAssociation
      - PublicSubnetCRouteTableAssociation
    Properties:
      CapacityProviderName: !Sub ${AWS::StackName}-provider
      InstanceRequirements:
        Architectures: [arm64]
      PropagateTags: true
      ScalingConfig:
        MaxVCpuCount: !Ref MaxVCpuCount
      Tags:
        Application: voker-managed-instances-probe
      VpcConfig:
        SecurityGroupIds: [!Ref CapacityProviderSecurityGroup]
        SubnetIds:
          - !Ref PublicSubnetA
          - !Ref PublicSubnetB
          - !Ref PublicSubnetC

  ManagedFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Architectures: [arm64]
      AutoPublishAlias: live
      CapacityProviderConfig:
        Arn: !GetAtt CapacityProvider.Arn
        ExecutionEnvironmentMemoryGiBPerVCpu: 2.0
        PerExecutionEnvironmentMaxConcurrency: !Ref PerExecutionEnvironmentMaxConcurrency
      CodeUri: .
      Description: Voker Arm64 concurrent invocation probe on Lambda Managed Instances
      Handler: bootstrap
      LoggingConfig:
        ApplicationLogLevel: INFO
        LogFormat: JSON
        SystemLogLevel: INFO
      MemorySize: 2048
      Runtime: provided.al2023
      Timeout: 6
      Tracing: Active

Outputs:
  CapacityProviderArn:
    Value: !GetAtt CapacityProvider.Arn
  FunctionAlias:
    Value: !Sub ${ManagedFunction}:live
  FunctionAliasArn:
    Value: !Sub ${ManagedFunction.Arn}:live
  MaxConcurrency:
    Value: !Ref PerExecutionEnvironmentMaxConcurrency
